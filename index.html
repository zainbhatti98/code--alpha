<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0; font-family: 'Segoe UI', sans-serif; color:#fff;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .app{
    width:420px; max-width:95vw;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius:22px; padding:22px;
    box-shadow: 0 12px 35px rgba(0,0,0,.25);
  }
  h1{margin:6px 0 14px; text-align:center}
  .input-row{display:flex; gap:10px}
  input{
    flex:1; padding:12px 14px; border-radius:12px; border:none; outline:none;
    font-size:15px;
  }
  button{
    border:none; border-radius:12px; padding:12px 14px; cursor:pointer;
    background:#ff7eb3; color:#fff; font-weight:600; transition:.2s;
  }
  button:hover{transform:translateY(-1px); background:#ff4f9a}
  .list{margin-top:16px; max-height:380px; overflow:auto}
  .item{
    display:flex; align-items:center; justify-content:space-between;
    background: rgba(0,0,0,0.2);
    padding:12px 12px; border-radius:12px; margin-bottom:10px;
    animation: fadeIn .25s ease;
  }
  .left{display:flex; align-items:center; gap:10px}
  .check{
    width:18px; height:18px; border-radius:50%; border:2px solid #fff;
    display:inline-block; cursor:pointer; position:relative;
  }
  .check.done{background:#00e676; border-color:#00e676}
  .text{font-size:15px}
  .text.done{text-decoration: line-through; opacity:.7}
  .actions{display:flex; gap:8px}
  .icon{
    border:none; border-radius:10px; padding:8px 10px; cursor:pointer;
    background: rgba(255,255,255,.15); color:#fff; transition:.2s;
  }
  .icon:hover{background: rgba(255,255,255,.28)}
  .empty{opacity:.8; text-align:center; margin-top:12px}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
</style>
</head>
<body>

<div class="app">
  <h1>To-Do List</h1>
  <div class="input-row">
    <input id="taskInput" placeholder="Add a new task..." />
    <button onclick="addTask()">Add</button>
  </div>
  <div id="list" class="list"></div>
  <div id="empty" class="empty">No tasks yet. Add one! ✨</div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

  function save(){
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function render(){
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    list.innerHTML = '';

    if(tasks.length === 0){ empty.style.display='block'; }
    else{ empty.style.display='none'; }

    tasks.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'item';

      const left = document.createElement('div');
      left.className = 'left';

      const check = document.createElement('span');
      check.className = 'check' + (t.done ? ' done' : '');
      check.onclick = () => toggleDone(i);

      const text = document.createElement('div');
      text.className = 'text' + (t.done ? ' done' : '');
      text.textContent = t.text;

      left.appendChild(check);
      left.appendChild(text);

      const actions = document.createElement('div');
      actions.className = 'actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'icon';
      editBtn.textContent = 'Edit';
      editBtn.onclick = () => editTask(i);

      const delBtn = document.createElement('button');
      delBtn.className = 'icon';
      delBtn.textContent = 'Delete';
      delBtn.onclick = () => deleteTask(i);

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);

      div.appendChild(left);
      div.appendChild(actions);

      list.appendChild(div);
    });
  }

  function addTask(){
    const input = document.getElementById('taskInput');
    const val = input.value.trim();
    if(!val) return;
    tasks.push({text: val, done:false});
    input.value = '';
    save(); render();
  }

  function toggleDone(i){
    tasks[i].done = !tasks[i].done;
    save(); render();
  }

  function deleteTask(i){
    tasks.splice(i,1);
    save(); render();
  }

  function editTask(i){
    const newText = prompt('Edit your task:', tasks[i].text);
    if(newText !== null && newText.trim() !== ''){
      tasks[i].text = newText.trim();
      save(); render();
    }
  }

  document.getElementById('taskInput').addEventListener('keypress', (e)=>{
    if(e.key === 'Enter') addTask();
  });

  render();
</script>

</body>
</html>
